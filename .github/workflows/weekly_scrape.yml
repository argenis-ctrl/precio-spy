name: Scraping Semanal de Precios

on:
  schedule:
    # Cada lunes a las 08:00 hora Chile (UTC-3 = 11:00 UTC)
    - cron: "0 11 * * 1"
  workflow_dispatch:  # Permite ejecución manual desde GitHub

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repositorio
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configurar Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Instalar dependencias
        run: |
          pip install --upgrade pip
          pip install requests beautifulsoup4 lxml playwright
          playwright install chromium
          playwright install-deps chromium

      - name: Ejecutar scrapers
        run: python -m scraper.run_all

      - name: Commit y push de la base de datos actualizada
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/precios.db
          git diff --staged --quiet || git commit -m "chore: actualización semanal de precios $(date +'%Y-%m-%d')"
          git push
